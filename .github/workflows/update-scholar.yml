name: Update Google Scholar stats

on:
  schedule:
    - cron: "17 9 * * *" # daily, 09:17 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scholar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Scholar stats
        run: node scripts/fetch-scholar.mjs

      # Pushes made with GITHUB_TOKEN don't trigger the push-based deploy
      # workflow, so dispatch it explicitly after committing.
      - name: Commit and deploy if changed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- src/data/scholar-live.ts; then
            echo "Citation data unchanged — nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/scholar-live.ts
          git commit -m "chore: sync Google Scholar citation stats"
          git push
          gh workflow run deploy.yml --ref main
