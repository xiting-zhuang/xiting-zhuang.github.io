- title: "Census Trade Data Scraper for Chinese Customs Data"
  url: "https://github.com/xiting-zhuang/China-Census-Scraper"
  description: "The Census Trade Data Scraper is a tool to retrieve trade data from the Chinese Customs website (中国海关数据). Based on Javascrip and Python, this scraper enables real-time data extraction also surpasses slide authentication automatically. Each run of the scraper can download up to 100,000 samples, increasing the efficiency of data acquisition, and it further streamlines the process by performing batch conversions to both CSV and Stata file formats."
  image: ""

- title: "Artificial Intelligence for Robotics -- Meteorites Project"
  url: ""
  description: "The project aimed to create a dynamic system for localizing and intercepting falling meteorites. Meteorites could appear anywhere on the screen, with constraints on the turret's rotation per timestamp. The turret could perform either rotation or firing, but not both simultaneously. Kalman Filters were used in optimizing tracking accuracy."
